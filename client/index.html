<!doctype html>
<html lang="en">

		<!-- ✅ Google Analytics 4 -->

			async

		></script>

			rel="preload"
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
			as="style"
		/>

			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
			rel="stylesheet"
		/>

		<!-- Primary Meta Tags -->
		<title>R4 Hub - Developer Resource Management Platform</title>

		/>

			name="description"
			content="Organize, save, search, and quickly access all your developer tools, AI platforms, documentation, and learning resources in one centralized hub."
		/>

		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://r4-hub.vercel.app/" />
		<meta
			property="og:title"
			content="R4 Hub - Developer Resource Management Platform"
		/>

			property="og:description"
			content="Organize, save, search, and quickly access all your developer tools, AI platforms, documentation, and learning resources."

			property="og:image"

		/>

		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />

		<!-- Theme Color -->

		<link rel="manifest" href="/manifest.json" />
